name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      deploy_path:
        description: Deployment directory on the Linux server
        required: true
        default: /opt/znopcommerce
      app_http_bind:
        description: Host bind for the nopCommerce container
        required: true
        default: 127.0.0.1:8080
      image_tag:
        description: Optional image tag override
        required: false
        default: ""

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  build-image:
    runs-on: ubuntu-latest
    outputs:
      image_repository: ${{ steps.image.outputs.image_repository }}
      image_tag: ${{ steps.image.outputs.image_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Calculate image metadata
        id: image
        shell: bash
        run: |
          repo="${GITHUB_REPOSITORY,,}"
          image_repository="${REGISTRY}/${repo}"
          image_tag="${{ inputs.image_tag }}"

          if [[ -z "${image_tag}" ]]; then
            image_tag="sha-${GITHUB_SHA}"
          fi

          echo "image_repository=${image_repository}" >> "${GITHUB_OUTPUT}"
          echo "image_tag=${image_tag}" >> "${GITHUB_OUTPUT}"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.image.outputs.image_repository }}:${{ steps.image.outputs.image_tag }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-image
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare SSH access
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
        run: |
          if [[ -z "${DEPLOY_HOST}" || -z "${DEPLOY_SSH_PRIVATE_KEY}" ]]; then
            echo "DEPLOY_HOST and DEPLOY_SSH_PRIVATE_KEY secrets are required."
            exit 1
          fi

          if [[ -z "${DEPLOY_PORT}" ]]; then
            DEPLOY_PORT="22"
          fi

          echo "DEPLOY_PORT=${DEPLOY_PORT}" >> "${GITHUB_ENV}"

          install -m 700 -d "${HOME}/.ssh"
          printf '%s\n' "${DEPLOY_SSH_PRIVATE_KEY}" > "${HOME}/.ssh/id_ed25519"
          chmod 600 "${HOME}/.ssh/id_ed25519"
          ssh-keyscan -p "${DEPLOY_PORT}" "${DEPLOY_HOST}" >> "${HOME}/.ssh/known_hosts"

      - name: Create deployment directories
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ inputs.deploy_path }}
        run: |
          if [[ -z "${DEPLOY_USER}" ]]; then
            echo "DEPLOY_USER secret is required."
            exit 1
          fi

          ssh -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" "
            mkdir -p '${DEPLOY_PATH}/appsettings' \
                     '${DEPLOY_PATH}/app_data/DataProtectionKeys' \
                     '${DEPLOY_PATH}/app_data/TempUploads' \
                     '${DEPLOY_PATH}/logs' \
                     '${DEPLOY_PATH}/storage/images' \
                     '${DEPLOY_PATH}/storage/files' \
                     '${DEPLOY_PATH}/storage/db_backups' \
                     '${DEPLOY_PATH}/storage/plugins_uploaded' \
                     '${DEPLOY_PATH}/nginx'
          "

      - name: Sync deployment assets
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ inputs.deploy_path }}
        run: |
          scp -P "${DEPLOY_PORT}" ops/docker/docker-compose.production.yml "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/docker-compose.production.yml"
          scp -P "${DEPLOY_PORT}" ops/docker/.env.production.example "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/.env.example"
          scp -P "${DEPLOY_PORT}" ops/docker/appsettings.production.example.json "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/appsettings/appsettings.production.example.json"
          scp -P "${DEPLOY_PORT}" ops/nginx/nopcommerce.conf "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/nginx/nopcommerce.conf.example"

      - name: Pull and restart containers
        shell: bash
        env:
          APP_HTTP_BIND: ${{ inputs.app_http_bind }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PATH: ${{ inputs.deploy_path }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          GHCR_DEPLOY_TOKEN: ${{ secrets.GHCR_DEPLOY_TOKEN }}
          GHCR_DEPLOY_USERNAME: ${{ secrets.GHCR_DEPLOY_USERNAME }}
          IMAGE_REPOSITORY: ${{ needs.build-image.outputs.image_repository }}
          IMAGE_TAG: ${{ needs.build-image.outputs.image_tag }}
        run: |
          if [[ -z "${GHCR_DEPLOY_USERNAME}" || -z "${GHCR_DEPLOY_TOKEN}" ]]; then
            echo "GHCR_DEPLOY_USERNAME and GHCR_DEPLOY_TOKEN secrets are required."
            exit 1
          fi

          printf '%s' "${GHCR_DEPLOY_TOKEN}" | ssh -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "docker login ${REGISTRY} --username '${GHCR_DEPLOY_USERNAME}' --password-stdin"

          ssh -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" "
            set -e
            cd '${DEPLOY_PATH}'

            if [ ! -f '.env' ]; then
              cp '.env.example' '.env'
            fi

            if [ ! -f 'appsettings/appsettings.json' ]; then
              echo 'Missing appsettings/appsettings.json. Copy appsettings.production.example.json and fill in production values first.'
              exit 1
            fi

            IMAGE_REPOSITORY='${IMAGE_REPOSITORY}' IMAGE_TAG='${IMAGE_TAG}' APP_HTTP_BIND='${APP_HTTP_BIND}' docker compose -f docker-compose.production.yml pull
            IMAGE_REPOSITORY='${IMAGE_REPOSITORY}' IMAGE_TAG='${IMAGE_TAG}' APP_HTTP_BIND='${APP_HTTP_BIND}' docker compose -f docker-compose.production.yml up -d
            docker image prune -f
          "
